name: Publish nuget package

permissions: {}

on:
  release:
    types: [published]

jobs:
  build-and-test:
    name: build-and-test
    uses: ./.github/workflows/build-test-publish.yml
    permissions:
      contents: write
    with:
      should-package: true
      should-publish-gh-page: true
      gh-page-destination-directory: ${{ github.event.release.tag_name }}

  publish:
    name: publish
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: 🔃 download artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: artifacts
          path: .

      - name: 📦 setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5

      - name: 🚀 publish nuget packages
        run: dotnet nuget push "*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
