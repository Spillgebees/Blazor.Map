name: Build, test, & publish

permissions: {}

on:
  workflow_call:
    inputs:
      should-package:
        type: boolean
        description: Whether to package project and upload as artifact.
        default: false
      should-run:
        type: boolean
        description: Whether to run the job.
        default: true
      dotnet-changed:
        type: boolean
        description: Whether .NET source files changed.
        default: true
      ts-changed:
        type: boolean
        description: Whether TypeScript source files changed.
        default: true

jobs:
  build-test-publish:
    name: build-test-publish
    if: inputs.should-run
    runs-on: ubuntu-latest
    env:
      HUSKY: 0

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          package_json_file: src/Spillgebees.Blazor.Map.Assets/package.json

      - name: 📦 setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: src/Spillgebees.Blazor.Map.Assets/pnpm-lock.yaml

      - name: 📦 setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: 📦 restore packages
        run: dotnet restore Spillgebees.Blazor.Map.slnx

      - name: 👷 build project
        run: dotnet build --configuration Release --no-restore Spillgebees.Blazor.Map.slnx

      - name: 🔍 lint TypeScript
        if: inputs.ts-changed
        run: pnpm run lint
        working-directory: src/Spillgebees.Blazor.Map.Assets

      - name: ✅ test .NET
        if: inputs.dotnet-changed
        run: dotnet test --solution Spillgebees.Blazor.Map.slnx --configuration Release --no-build

      - name: ✅ test TypeScript
        if: inputs.ts-changed
        run: pnpm run test
        working-directory: src/Spillgebees.Blazor.Map.Assets

      - name: 🎭 install Playwright browser
        if: inputs.dotnet-changed || inputs.ts-changed
        run: pnpm exec playwright install --with-deps chromium
        working-directory: src/Spillgebees.Blazor.Map.Assets

      - name: 🎭 browser regression tests
        if: inputs.dotnet-changed || inputs.ts-changed
        run: pnpm run test:browser
        working-directory: src/Spillgebees.Blazor.Map.Assets

      - name: 📦 package the application
        if: inputs.should-package
        run: dotnet pack src/Spillgebees.Blazor.Map/Spillgebees.Blazor.Map.csproj --configuration Release --no-build --output package

      - name: 🔃 upload artifacts
        if: inputs.should-package
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: artifacts
          if-no-files-found: error
          retention-days: 1
          path: package/*.nupkg
